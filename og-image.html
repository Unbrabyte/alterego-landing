<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(129,90,240,0.18) 0%, rgba(79,55,200,0.06) 50%, transparent 70%);
    top: -150px;
    right: -100px;
    pointer-events: none;
  }
  .bg-glow-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    bottom: -200px;
    left: -50px;
    pointer-events: none;
  }
  .border-line {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(129,90,240,0.15);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 80px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: white;
    font-weight: 800;
    letter-spacing: -1px;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    background: linear-gradient(135deg, #c4b5fd, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  p.subtitle {
    font-size: 26px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    line-height: 1.4;
    max-width: 700px;
    margin: 0 auto;
  }
  .footer {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    font-weight: 400;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>
  <div class="border-line"></div>
  <div class="content">
    <div class="logo-icon">AE</div>
    <h1>Alter Ego</h1>
    <p class="subtitle">Plataforma de bots conversacionales con IA</p>
  </div>
  <div class="footer">by Unbrabyte</div>
</body>
</html>
